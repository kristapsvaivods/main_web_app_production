<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ražošanas Uzskaite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    th, td { 
      padding: 8px 5px; 
      font-size: 13px; 
      border: 1px solid #86efac;
      white-space: nowrap;
    }
    .header-bg { background-color: #86efac; }
    .scroll-container { 
      overflow-x: auto; 
      -webkit-overflow-scrolling: touch;
    }
    input[type="number"] {
      width: 58px;
      text-align: center;
      font-size: 14px;
    }
    @media (max-width: 900px) {
      th, td {
        padding: 7px 4px;
        font-size: 12.5px;
      }
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen pb-8">

  <div class="max-w-[820px] mx-auto p-3">

    <!-- Header -->
    <div class="bg-white shadow rounded-2xl p-4 mb-5">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-2xl font-bold text-emerald-700">Ražošanas uzskaite</h1>
          <p class="text-emerald-600 text-sm">Kopīga • Google Sheets</p>
        </div>
        <button onclick="addNewEntry()" 
                class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-xl flex items-center gap-2 text-sm font-medium">
          <span class="text-xl">+</span> Pievienot
        </button>
      </div>
      <div id="sync-status" class="mt-3 text-center text-sm text-emerald-600 hidden">Saglabāts! ✓</div>
    </div>

    <!-- Table -->
    <div class="bg-white shadow-xl rounded-3xl overflow-hidden">
      <div class="scroll-container">
        <table class="w-full text-xs">
          <thead>
            <tr class="header-bg">
              <th class="py-3">DATUMS</th>
              <th class="py-3">RAŽOJUMS</th>
              <th colspan="6" class="py-3">FORMĀTS</th>
              <th class="py-3">VALODA</th>
            </tr>
            <tr class="header-bg text-[10px]">
              <th></th>
              <th></th>
              <th>Bundža</th>
              <th>250 paka</th>
              <th>1 kg</th>
              <th>3 kg</th>
              <th>500 paka</th>
              <th>ZW</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="table-body" class="text-gray-700"></tbody>
          <tfoot>
            <tr class="bg-emerald-100 font-bold text-emerald-900">
              <td colspan="2" class="text-left pl-4 py-3 text-sm">KOPĀ</td>
              <td id="total-bundza" class="py-3">0</td>
              <td id="total-250" class="py-3">0</td>
              <td id="total-1kg" class="py-3">0</td>
              <td id="total-3kg" class="py-3">0</td>
              <td id="total-500" class="py-3">0</td>
              <td id="total-zw" class="py-3">0</td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>

    <div class="mt-4 text-center text-xs text-gray-500">
      Dati atjaunojas automātiski
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-3">
    <div class="bg-white rounded-3xl w-full max-w-[380px]">
      <div class="bg-emerald-600 text-white px-5 py-4 rounded-t-3xl flex justify-between">
        <h2 class="font-semibold">Jauns ieraksts</h2>
        <button onclick="closeModal()" class="text-2xl leading-none">×</button>
      </div>

      <div class="p-5 space-y-4">
        <div>
          <label class="text-xs font-medium text-emerald-700">Datums</label>
          <input id="input-date" type="date" class="w-full border border-emerald-300 rounded-2xl px-4 py-3 mt-1">
        </div>

        <div>
          <label class="text-xs font-medium text-emerald-700">Ražojums</label>
          <input id="input-raz" type="text" placeholder="Nosaukums" 
                 class="w-full border border-emerald-300 rounded-2xl px-4 py-3 mt-1">
        </div>

        <div>
          <label class="text-xs font-medium text-emerald-700 mb-2 block">Formāts</label>
          <div class="grid grid-cols-3 gap-3">
            <div><input id="input-bundza" type="number" min="0" value="0" class="w-full border rounded-xl py-2 text-center text-sm"></div>
            <div><input id="input-250" type="number" min="0" value="0" class="w-full border rounded-xl py-2 text-center text-sm"></div>
            <div><input id="input-1kg" type="number" min="0" value="0" class="w-full border rounded-xl py-2 text-center text-sm"></div>
            <div><input id="input-3kg" type="number" min="0" value="0" class="w-full border rounded-xl py-2 text-center text-sm"></div>
            <div><input id="input-500" type="number" min="0" value="0" class="w-full border rounded-xl py-2 text-center text-sm"></div>
            <div><input id="input-zw" type="number" min="0" value="0" class="w-full border rounded-xl py-2 text-center text-sm"></div>
          </div>
        </div>

        <div>
          <label class="text-xs font-medium text-emerald-700">Valoda</label>
          <select id="input-valoda" class="w-full border border-emerald-300 rounded-2xl px-4 py-3 mt-1">
            <option value="LV">LV</option>
            <option value="ENG">ENG</option>
            <option value="EE">EE</option>
            <option value="LT">LT</option>
            <option value="FR">FR</option>
            <option value="PT">PT</option>
          </select>
        </div>
      </div>

      <div class="border-t flex">
        <button onclick="closeModal()" class="flex-1 py-4 text-sm font-medium border-r">Atcelt</button>
        <button onclick="saveEntry()" class="flex-1 py-4 bg-emerald-600 text-white text-sm font-semibold">Saglabāt</button>
      </div>
    </div>
  </div>

  <script>
    const SHEET_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwUh_fnF2ETkSXqbqzfBHW4PIRQgUXnwf8sgzxL-riACRNvDSKjC4xN2liTw1Wzo8tb/exec";

    let entries = [];

    async function loadData() {
      try {
        const resp = await fetch(`${SHEET_WEB_APP_URL}?action=getAll`);
        const result = await resp.json();
        if (result.status === 'success') {
          entries = result.data || [];
          entries.sort((a,b) => new Date(b.date) - new Date(a.date));
          renderTable();
        }
      } catch (e) { console.error(e); }
    }

    function formatDate(iso) {
      if (!iso) return '-';
      const d = new Date(iso);
      return `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()}`;
    }

    function renderTable() {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';

      let totals = {bundza:0, pak250:0, kg1:0, kg3:0, pak500:0, zw:0};

      entries.forEach(entry => {
        const tr = document.createElement('tr');
        tr.className = "hover:bg-emerald-50";
        tr.innerHTML = `
          <td>${formatDate(entry.date)}</td>
          <td class="text-left pl-2">${entry.razojums || '-'}</td>
          <td>${entry.bundza || 0}</td>
          <td>${entry.pak250 || 0}</td>
          <td>${entry.kg1 || 0}</td>
          <td>${entry.kg3 || 0}</td>
          <td>${entry.pak500 || 0}</td>
          <td>${entry.zw || 0}</td>
          <td>${entry.valoda || '-'}</td>
        `;
        tbody.appendChild(tr);

        totals.bundza += Number(entry.bundza) || 0;
        totals.pak250 += Number(entry.pak250) || 0;
        totals.kg1    += Number(entry.kg1)    || 0;
        totals.kg3    += Number(entry.kg3)    || 0;
        totals.pak500 += Number(entry.pak500) || 0;
        totals.zw     += Number(entry.zw)     || 0;
      });

      document.getElementById('total-bundza').textContent = totals.bundza;
      document.getElementById('total-250').textContent = totals.pak250;
      document.getElementById('total-1kg').textContent = totals.kg1;
      document.getElementById('total-3kg').textContent = totals.kg3;
      document.getElementById('total-500').textContent = totals.pak500;
      document.getElementById('total-zw').textContent = totals.zw;
    }

    function addNewEntry() {
      document.getElementById('input-date').value = new Date().toISOString().slice(0,10);
      document.getElementById('input-raz').value = '';
      ['bundza','250','1kg','3kg','500','zw'].forEach(id => {
        document.getElementById('input-'+id).value = 0;
      });
      document.getElementById('input-valoda').value = 'LV';
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function saveEntry() {
      const date = document.getElementById('input-date').value;
      if (!date) return alert('Izvēlies datumu!');

      const payload = {
        date: date,
        raz: document.getElementById('input-raz').value.trim(),
        bundza: Number(document.getElementById('input-bundza').value) || 0,
        pak250: Number(document.getElementById('input-250').value) || 0,
        kg1: Number(document.getElementById('input-1kg').value) || 0,
        kg3: Number(document.getElementById('input-3kg').value) || 0,
        pak500: Number(document.getElementById('input-500').value) || 0,
        zw: Number(document.getElementById('input-zw').value) || 0,
        valoda: document.getElementById('input-valoda').value
      };

      closeModal();

      const statusEl = document.getElementById('sync-status');
      statusEl.classList.remove('hidden');
      statusEl.textContent = "Saglabāts! ✓";

      fetch(SHEET_WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      }).catch(() => {});

      setTimeout(() => {
        loadData();
        setTimeout(() => statusEl.classList.add('hidden'), 1400);
      }, 1100);
    }

    window.addEventListener('load', loadData);
  </script>
</body>
</html>
