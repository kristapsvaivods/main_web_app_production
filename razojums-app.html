<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ražošanas Uzskaites App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    th, td { border: 1px solid #86efac; padding: 10px 8px; text-align: center; }
    .header-bg { background-color: #86efac; }
  </style>
</head>
<body class="bg-gray-50 p-4">

  <div class="max-w-6xl mx-auto">
    <h1 class="text-3xl font-bold text-emerald-700 mb-2">Ražošanas uzskaite</h1>
    <p class="text-emerald-600 mb-6">Test version - check F12 Console for logs</p>

    <button onclick="addNewEntry()" class="bg-emerald-600 text-white px-6 py-3 rounded-xl mb-6">
      + Pievienot ierakstu
    </button>

    <div class="bg-white rounded-2xl shadow overflow-hidden">
      <table class="w-full">
        <thead class="header-bg">
          <tr>
            <th>DATUMS</th>
            <th>RAŽOJUMS</th>
            <th>Bundža</th>
            <th>250 paka</th>
            <th>1 kg paka</th>
            <th>3 kg paka</th>
            <th>500 paka</th>
            <th>ZW</th>
            <th>VALODA</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl w-full max-w-md mx-4">
      <div class="p-6">
        <h2 class="text-xl font-bold mb-4">Jauns ieraksts</h2>
        
        <input id="input-date" type="date" class="w-full border p-3 rounded mb-3">
        <input id="input-raz" type="text" placeholder="Ražojums" class="w-full border p-3 rounded mb-3">

        <div class="grid grid-cols-3 gap-3 text-sm">
          <div><input id="input-bundza" type="number" value="0" class="w-full border p-2 text-center"></div>
          <div><input id="input-250" type="number" value="0" class="w-full border p-2 text-center"></div>
          <div><input id="input-1kg" type="number" value="0" class="w-full border p-2 text-center"></div>
          <div><input id="input-3kg" type="number" value="0" class="w-full border p-2 text-center"></div>
          <div><input id="input-500" type="number" value="0" class="w-full border p-2 text-center"></div>
          <div><input id="input-zw" type="number" value="0" class="w-full border p-2 text-center"></div>
        </div>

        <select id="input-valoda" class="w-full border p-3 rounded mt-4">
          <option value="LV">LV</option>
          <option value="ENG">ENG</option>
          <option value="EE">EE</option>
          <option value="LT">LT</option>
        </select>
      </div>

      <div class="flex border-t">
        <button onclick="closeModal()" class="flex-1 py-4 font-medium">Atcelt</button>
        <button onclick="saveEntry()" class="flex-1 py-4 bg-emerald-600 text-white font-semibold">Saglabāt</button>
      </div>
    </div>
  </div>

  <script>
    const SHEET_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwUh_fnF2ETkSXqbqzfBHW4PIRQgUXnwf8sgzxL-riACRNvDSKjC4xN2liTw1Wzo8tb/exec";

    let entries = [];

    async function loadData() {
      try {
        const res = await fetch(`${SHEET_WEB_APP_URL}?action=getAll`);
        const data = await res.json();
        if (data.status === 'success') {
          entries = data.data || [];
          renderTable();
        }
      } catch (e) {
        console.error("Load failed:", e);
      }
    }

    function renderTable() {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';
      entries.forEach(e => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${e.date || '-'}</td>
          <td class="text-left">${e.razojums || '-'}</td>
          <td>${e.bundza || 0}</td>
          <td>${e.pak250 || 0}</td>
          <td>${e.kg1 || 0}</td>
          <td>${e.kg3 || 0}</td>
          <td>${e.pak500 || 0}</td>
          <td>${e.zw || 0}</td>
          <td>${e.valoda || '-'}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function addNewEntry() {
      document.getElementById('input-date').value = new Date().toISOString().slice(0,10);
      document.getElementById('input-raz').value = '';
      ['bundza','250','1kg','3kg','500','zw'].forEach(id => document.getElementById('input-'+id).value = 0);
      document.getElementById('input-valoda').value = 'LV';
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function saveEntry() {
      const payload = {
        date: document.getElementById('input-date').value,
        raz: document.getElementById('input-raz').value.trim(),
        bundza: Number(document.getElementById('input-bundza').value) || 0,
        pak250: Number(document.getElementById('input-250').value) || 0,
        kg1: Number(document.getElementById('input-1kg').value) || 0,
        kg3: Number(document.getElementById('input-3kg').value) || 0,
        pak500: Number(document.getElementById('input-500').value) || 0,
        zw: Number(document.getElementById('input-zw').value) || 0,
        valoda: document.getElementById('input-valoda').value
      };

      console.log("→ Sending this payload:", payload);

      closeModal();

      fetch(SHEET_WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      })
      .then(() => {
        console.log("POST request sent successfully");
        setTimeout(loadData, 1500);   // refresh list after save
      })
      .catch(err => console.error("Fetch error:", err));
    }

    window.onload = loadData;
  </script>
</body>
</html>
