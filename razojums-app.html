<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ražošanas Uzskaite - Kopsavilkums</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    th, td { padding: 10px 6px; font-size: 13.5px; border: 1px solid #86efac; }
    .header-bg { background-color: #86efac; }
    .group-row { background-color: #f8fafc; font-weight: 600; }
  </style>
</head>
<body class="bg-gray-50 p-4">

  <div class="max-w-[900px] mx-auto">
    <div class="bg-white shadow rounded-2xl p-5 mb-6">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-2xl font-bold text-emerald-700">Ražošanas uzskaite</h1>
          <p class="text-emerald-600">Kopsavilkums pēc Ražojums + Valoda</p>
        </div>
        <button onclick="addNewEntry()" 
                class="bg-emerald-600 text-white px-6 py-3 rounded-2xl flex items-center gap-2">
          + Pievienot ierakstu
        </button>
      </div>
      <div id="sync-status" class="mt-4 text-center text-emerald-600 hidden">Saglabāts! ✓</div>
    </div>

    <div class="bg-white shadow-xl rounded-3xl overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="header-bg">
            <tr>
              <th class="text-left">RAŽOJUMS</th>
              <th>VALODA</th>
              <th>Bundža</th>
              <th>250 paka</th>
              <th>1 kg</th>
              <th>3 kg</th>
              <th>500 paka</th>
              <th>ZW</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
          <tfoot>
            <tr class="bg-emerald-100 font-bold">
              <td colspan="2" class="text-left pl-5">KOPĀ VISI</td>
              <td id="total-bundza">0</td>
              <td id="total-250">0</td>
              <td id="total-1kg">0</td>
              <td id="total-3kg">0</td>
              <td id="total-500">0</td>
              <td id="total-zw">0</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl w-full max-w-md">
      <div class="bg-emerald-600 text-white p-5 rounded-t-3xl flex justify-between">
        <h2 class="font-semibold">Jauns ieraksts</h2>
        <button onclick="closeModal()" class="text-3xl">×</button>
      </div>
      <div class="p-6 space-y-5">
        <div>
          <label class="block text-sm font-medium text-emerald-700 mb-1">Ražojums (kafijas veids)</label>
          <input id="input-raz" type="text" placeholder="Piem. CB Classic" 
                 class="w-full border-2 border-emerald-300 rounded-2xl px-4 py-3">
        </div>
        <div>
          <label class="block text-sm font-medium text-emerald-700 mb-1">Datums</label>
          <input id="input-date" type="date" class="w-full border border-emerald-300 rounded-2xl px-4 py-3">
        </div>
        <div>
          <label class="block text-sm font-medium text-emerald-700 mb-3">Iepakojuma daudzums</label>
          <div class="grid grid-cols-3 gap-4">
            <div><label class="text-xs text-emerald-600">Bundža</label><input id="input-bundza" type="number" min="0" class="w-full border rounded-xl py-2 text-center"></div>
            <div><label class="text-xs text-emerald-600">250 paka</label><input id="input-250" type="number" min="0" class="w-full border rounded-xl py-2 text-center"></div>
            <div><label class="text-xs text-emerald-600">1 kg</label><input id="input-1kg" type="number" min="0" class="w-full border rounded-xl py-2 text-center"></div>
            <div><label class="text-xs text-emerald-600">3 kg</label><input id="input-3kg" type="number" min="0" class="w-full border rounded-xl py-2 text-center"></div>
            <div><label class="text-xs text-emerald-600">500 paka</label><input id="input-500" type="number" min="0" class="w-full border rounded-xl py-2 text-center"></div>
            <div><label class="text-xs text-emerald-600">ZW</label><input id="input-zw" type="number" min="0" class="w-full border rounded-xl py-2 text-center"></div>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-emerald-700 mb-1">Valoda</label>
          <select id="input-valoda" class="w-full border border-emerald-300 rounded-2xl px-4 py-3">
            <option value="LV">LV</option>
            <option value="ENG">ENG</option>
            <option value="EE">EE</option>
            <option value="LT">LT</option>
            <option value="FR">FR</option>
            <option value="PT">PT</option>
          </select>
        </div>
      </div>
      <div class="border-t flex">
        <button onclick="closeModal()" class="flex-1 py-4">Atcelt</button>
        <button onclick="saveEntry()" class="flex-1 py-4 bg-emerald-600 text-white font-semibold">Saglabāt</button>
      </div>
    </div>
  </div>

  <script>
    const SHEET_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzwzYe_7TYWeRNYXOKy_R6FDwclYEMSWkJUAqhJyEbAkDsXiN1QfMQzLwLA_ZMu6D4/exec";

    let entries = [];

    async function loadData() {
      try {
        const resp = await fetch(`${SHEET_WEB_APP_URL}?action=getAll`);
        const result = await resp.json();
        if (result.status === 'success') {
          entries = result.data || [];
          renderTable();
        }
      } catch (e) { console.error(e); }
    }

    function formatDate(iso) {
      if (!iso) return '-';
      const d = new Date(iso);
      return `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()}`;
    }

    function renderTable() {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';

      // Group by Ražojums + Valoda
      const groups = {};

      entries.forEach(entry => {
        const key = `${entry.razojums || 'Nezināms'}|${entry.valoda || 'N/A'}`;

        if (!groups[key]) {
          groups[key] = {
            razojums: entry.razojums || 'Nezināms',
            valoda: entry.valoda || 'N/A',
            bundza: 0,
            pak250: 0,
            kg1: 0,
            kg3: 0,
            pak500: 0,
            zw: 0
          };
        }

        groups[key].bundza += Number(entry.bundza) || 0;
        groups[key].pak250 += Number(entry.pak250) || 0;
        groups[key].kg1 += Number(entry.kg1) || 0;
        groups[key].kg3 += Number(entry.kg3) || 0;
        groups[key].pak500 += Number(entry.pak500) || 0;
        groups[key].zw += Number(entry.zw) || 0;
      });

      let grandTotals = {bundza:0, pak250:0, kg1:0, kg3:0, pak500:0, zw:0};

      Object.values(groups).forEach(group => {
        const tr = document.createElement('tr');
        tr.className = "group-row";
        tr.innerHTML = `
          <td class="font-medium">${group.razojums}</td>
          <td>${group.valoda}</td>
          <td>${group.bundza || ''}</td>
          <td>${group.pak250 || ''}</td>
          <td>${group.kg1 || ''}</td>
          <td>${group.kg3 || ''}</td>
          <td>${group.pak500 || ''}</td>
          <td>${group.zw || ''}</td>
        `;
        tbody.appendChild(tr);

        grandTotals.bundza += group.bundza;
        grandTotals.pak250 += group.pak250;
        grandTotals.kg1 += group.kg1;
        grandTotals.kg3 += group.kg3;
        grandTotals.pak500 += group.pak500;
        grandTotals.zw += group.zw;
      });

      // Update grand totals
      document.getElementById('total-bundza').textContent = grandTotals.bundza || '';
      document.getElementById('total-250').textContent = grandTotals.pak250 || '';
      document.getElementById('total-1kg').textContent = grandTotals.kg1 || '';
      document.getElementById('total-3kg').textContent = grandTotals.kg3 || '';
      document.getElementById('total-500').textContent = grandTotals.pak500 || '';
      document.getElementById('total-zw').textContent = grandTotals.zw || '';
    }

    function addNewEntry() {
      document.getElementById('input-date').value = new Date().toISOString().slice(0,10);
      document.getElementById('input-raz').value = '';
      ['bundza','250','1kg','3kg','500','zw'].forEach(id => {
        document.getElementById('input-'+id).value = '';
      });
      document.getElementById('input-valoda').value = 'LV';
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function saveEntry() {
      const payload = {
        date: document.getElementById('input-date').value,
        raz: document.getElementById('input-raz').value.trim(),
        bundza: Number(document.getElementById('input-bundza').value) || 0,
        pak250: Number(document.getElementById('input-250').value) || 0,
        kg1: Number(document.getElementById('input-1kg').value) || 0,
        kg3: Number(document.getElementById('input-3kg').value) || 0,
        pak500: Number(document.getElementById('input-500').value) || 0,
        zw: Number(document.getElementById('input-zw').value) || 0,
        valoda: document.getElementById('input-valoda').value
      };

      closeModal();

      const statusEl = document.getElementById('sync-status');
      statusEl.classList.remove('hidden');

      fetch(SHEET_WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });

      setTimeout(() => {
        loadData();
        setTimeout(() => statusEl.classList.add('hidden'), 1500);
      }, 1200);
    }

    window.addEventListener('load', loadData);
  </script>
</body>
</html>
