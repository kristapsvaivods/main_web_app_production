<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ražošanas Uzskaite</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    th, td { padding: 10px 6px; font-size: 13px; border: 1px solid #86efac; }
    .header-bg { background-color: #86efac; }
    .input-field { width: 80px; }
  </style>
</head>
<body class="bg-gray-50 p-4">

  <div class="max-w-[850px] mx-auto">
    <div class="bg-white shadow rounded-2xl p-5 mb-6">
      <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold text-emerald-700">Ražošanas uzskaite</h1>
        <button onclick="addNewEntry()" class="bg-emerald-600 text-white px-6 py-3 rounded-2xl">+ Pievienot ierakstu</button>
      </div>
      <div id="sync-status" class="mt-4 text-center text-emerald-600 hidden">Saglabāts! ✓</div>
    </div>

    <div class="bg-white shadow-xl rounded-3xl overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="header-bg">
            <tr>
              <th>DATUMS</th>
              <th>RAŽOJUMS</th>
              <th>Bundža</th>
              <th>250 paka</th>
              <th>1 kg</th>
              <th>3 kg</th>
              <th>500 paka</th>
              <th>ZW</th>
              <th>VALODA</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
          <tfoot>
            <tr class="bg-emerald-100 font-bold">
              <td colspan="2" class="text-left pl-5">KOPĀ</td>
              <td id="total-bundza">0</td>
              <td id="total-250">0</td>
              <td id="total-1kg">0</td>
              <td id="total-3kg">0</td>
              <td id="total-500">0</td>
              <td id="total-zw">0</td>
              <td></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl w-full max-w-md">
      <div class="bg-emerald-600 text-white p-5 rounded-t-3xl flex justify-between">
        <h2 class="font-semibold">Jauns ieraksts</h2>
        <button onclick="closeModal()" class="text-3xl">×</button>
      </div>
      <div class="p-6 space-y-5">
        <div>
          <label class="block text-sm font-medium text-emerald-700 mb-1">Ražojums</label>
          <input id="input-raz" type="text" placeholder="Kafijas veids" class="w-full border-2 border-emerald-300 rounded-2xl px-4 py-3">
        </div>
        <div>
          <label class="block text-sm font-medium text-emerald-700 mb-1">Datums</label>
          <input id="input-date" type="date" class="w-full border border-emerald-300 rounded-2xl px-4 py-3">
        </div>
        <div>
          <label class="block text-sm font-medium text-emerald-700 mb-2">Formāts</label>
          <div class="grid grid-cols-3 gap-3">
            <div class="text-center">
              <label class="text-xs text-emerald-600 block mb-1">Bundža</label>
              <input id="input-bundza" type="number" value="" placeholder=" " class="border p-2 input-field text-center rounded-xl">
            </div>
            <div class="text-center">
              <label class="text-xs text-emerald-600 block mb-1">250g</label>
              <input id="input-250" type="number" value="" placeholder=" " class="border p-2 input-field text-center rounded-xl">
            </div>
            <div class="text-center">
              <label class="text-xs text-emerald-600 block mb-1">1KG</label>
              <input id="input-1kg" type="number" value="" placeholder=" " class="border p-2 input-field text-center rounded-xl">
            </div>
            <div class="text-center">
            <label class="text-xs text-emerald-600 block mb-1">3KG</label>
              <input id="input-3kg" type="number" value="" placeholder=" " class="border p-2 input-field text-center rounded-xl">
              </div>
            <div class="text-center">
              <label class="text-xs text-emerald-600 block mb-1">500g</label>
              <input id="input-500" type="number" value="" placeholder=" " class="border p-2 input-field text-center rounded-xl">
            </div>
            <div class="text-center">
              <label class="text-xs text-emerald-600 block mb-1">ZW</label>
              <input id="input-zw" type="number" value="" placeholder=" " class="border p-2 input-field text-center rounded-xl">
            </div>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium text-emerald-700 mb-1">Valoda</label>
          <select id="input-valoda" class="w-full border border-emerald-300 rounded-2xl px-4 py-3">
            <option value="LV">LV</option>
            <option value="ENG">ENG</option>
            <option value="EE">EE</option>
            <option value="LT">LT</option>
            <option value="LT">FR</option>
            <option value="LT">PT</option>
          </select>
        </div>
      </div>
      <div class="border-t flex">
        <button onclick="closeModal()" class="flex-1 py-4">Atcelt</button>
        <button onclick="saveEntry()" class="flex-1 py-4 bg-emerald-600 text-white font-semibold">Saglabāt</button>
      </div>
    </div>
  </div>

  <script>
    const SHEET_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzwzYe_7TYWeRNYXOKy_R6FDwclYEMSWkJUAqhJyEbAkDsXiN1QfMQzLwLA_ZMu6D4/exec";

    let entries = [];

    async function loadData() {
      try {
        const resp = await fetch(`${SHEET_WEB_APP_URL}?action=getAll`);
        const result = await resp.json();
        if (result.status === 'success') {
          entries = result.data || [];
          entries.sort((a,b) => new Date(b.date) - new Date(a.date));
          renderTable();
        }
      } catch (e) { console.error(e); }
    }

    // Format date to dd.mm.yyyy
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return `${d.getDate().toString().padStart(2, '0')}.${(d.getMonth()+1).toString().padStart(2, '0')}.${d.getFullYear()}`;
        }

    function renderTable() {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';

      let totals = {bundza:0, pak250:0, kg1:0, kg3:0, pak500:0, zw:0};

      entries.forEach(entry => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${formatDate(entry.date)}</td>
          <td class="text-left">${entry.razojums || '-'}</td>
          <td>${entry.bundza || ''}</td>
          <td>${entry.pak250 || ''}</td>
          <td>${entry.kg1 || ''}</td>
          <td>${entry.kg3 || ''}</td>
          <td>${entry.pak500 || ''}</td>
          <td>${entry.zw || ''}</td>
          <td>${entry.valoda || '-'}</td>
        `;
        tbody.appendChild(tr);

        totals.bundza += Number(entry.bundza)|| 0;
        totals.pak250 += Number(entry.pak250)|| 0;
        totals.kg1 += Number(entry.kg1)|| 0;
        totals.kg3 += Number(entry.kg3)|| 0;
        totals.pak500 += Number(entry.pak500)|| 0;
        totals.zw += Number(entry.zw)|| 0;
      });

      document.getElementById('total-bundza').textContent = totals.bundza;
      document.getElementById('total-250').textContent = totals.pak250;
      document.getElementById('total-1kg').textContent = totals.kg1;
      document.getElementById('total-3kg').textContent = totals.kg3;
      document.getElementById('total-500').textContent = totals.pak500;
      document.getElementById('total-zw').textContent = totals.zw;
    }

    function addNewEntry() {
      document.getElementById('input-date').value = new Date().toISOString().slice(0,10);
      document.getElementById('input-raz').value = '';
      ['bundza','250','1kg','3kg','500','zw'].forEach(id => document.getElementById('input-'+id).value = 0);
      document.getElementById('input-valoda').value = 'LV';
      document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
    }

    function saveEntry() {
      const payload = {
        date: document.getElementById('input-date').value,
        raz: document.getElementById('input-raz').value.trim(),
        bundza: Number(document.getElementById('input-bundza').value) || '',
        pak250: Number(document.getElementById('input-250').value) || '',
        kg1: Number(document.getElementById('input-1kg').value) || '',
        kg3: Number(document.getElementById('input-3kg').value) || '',
        pak500: Number(document.getElementById('input-500').value) || '',
        zw: Number(document.getElementById('input-zw').value) || '',
        valoda: document.getElementById('input-valoda').value
      };

      closeModal();

      fetch(SHEET_WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });

      document.getElementById('sync-status').classList.remove('hidden');
      setTimeout(() => {
        loadData();
        setTimeout(() => document.getElementById('sync-status').classList.add('hidden'), 1500);
      }, 1200);
    }

    window.addEventListener('load', loadData);
  </script>
</body>
</html>
